<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- The Star Chanter - Wisdom, Science, Connection -->
  <defs>
    <linearGradient id="chantGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3E2E5C" stop-opacity="1" />
      <stop offset="50%" stop-color="#5CE7E7" stop-opacity="1" />
      <stop offset="100%" stop-color="#3E2E5C" stop-opacity="1" />
    </linearGradient>
    <filter id="chantGlow">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Central star representing the chanting voice -->
  <circle cx="20" cy="20" r="3" 
          fill="url(#chantGradient)"
          filter="url(#chantGlow)"/>
  
  <!-- Sound waves emanating outward in organic curves -->
  <path d="M20 20 C25 15, 30 15, 32 20 C30 25, 25 25, 20 20"
        stroke="url(#chantGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
        
  <path d="M20 20 C15 15, 10 15, 8 20 C10 25, 15 25, 20 20"
        stroke="url(#chantGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
  
  <!-- Vertical sound waves -->
  <path d="M20 20 C15 15, 15 10, 20 8 C25 10, 25 15, 20 20"
        stroke="url(#chantGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
        
  <path d="M20 20 C15 25, 15 30, 20 32 C25 30, 25 25, 20 20"
        stroke="url(#chantGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
  
  <!-- Outer resonance rings -->
  <circle cx="20" cy="20" r="10" 
          stroke="url(#chantGradient)" 
          stroke-width="1" 
          fill="none"
          opacity="0.6"
          stroke-dasharray="2,3"/>
          
  <circle cx="20" cy="20" r="15" 
          stroke="url(#chantGradient)" 
          stroke-width="0.8" 
          fill="none"
          opacity="0.4"
          stroke-dasharray="3,4"/>
  
  <!-- Connecting nodes showing scientific precision -->
  <circle cx="20" cy="5" r="1.5" 
          fill="url(#chantGradient)"
          opacity="0.9"/>
          
  <circle cx="35" cy="20" r="1.5" 
          fill="url(#chantGradient)"
          opacity="0.9"/>
          
  <circle cx="20" cy="35" r="1.5" 
          fill="url(#chantGradient)"
          opacity="0.9"/>
          
  <circle cx="5" cy="20" r="1.5" 
          fill="url(#chantGradient)"
          opacity="0.9"/>
  
  <!-- Diagonal harmony points -->
  <circle cx="28" cy="12" r="1" 
          fill="url(#chantGradient)"
          opacity="0.7"/>
          
  <circle cx="28" cy="28" r="1" 
          fill="url(#chantGradient)"
          opacity="0.7"/>
          
  <circle cx="12" cy="12" r="1" 
          fill="url(#chantGradient)"
          opacity="0.7"/>
          
  <circle cx="12" cy="28" r="1" 
          fill="url(#chantGradient)"
          opacity="0.7"/>
  
  <!-- Energy connection lines between nodes -->
  <path d="M20 5 L20 8"
        stroke="url(#chantGradient)" 
        stroke-width="0.5" 
        opacity="0.5"/>
        
  <path d="M35 20 L32 20"
        stroke="url(#chantGradient)" 
        stroke-width="0.5" 
        opacity="0.5"/>
        
  <path d="M20 35 L20 32"
        stroke="url(#chantGradient)" 
        stroke-width="0.5" 
        opacity="0.5"/>
        
  <path d="M5 20 L8 20"
        stroke="url(#chantGradient)" 
        stroke-width="0.5" 
        opacity="0.5"/>
  
  <!-- Inner crystalline structure showing wisdom -->
  <path d="M17 17 L23 17 L23 23 L17 23 Z"
        stroke="url(#chantGradient)" 
        stroke-width="0.8" 
        fill="none"
        opacity="0.3"
        transform="rotate(45 20 20)"/>
</svg>
