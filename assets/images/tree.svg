<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- The Gnarled Tree - Age, Wisdom, Tradition -->
  <defs>
    <linearGradient id="treeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5CE7E7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E3757;stop-opacity:1" />
    </linearGradient>
    <filter id="treeGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Tree trunk - gnarled and ancient -->
  <path d="M18 35 C18 32, 17 30, 16 28 C15 26, 16 24, 17 22 C18 20, 17 18, 16 16 C15 14, 16 12, 18 10 C20 8, 22 8, 24 10 C26 12, 27 14, 26 16 C25 18, 24 20, 25 22 C26 24, 27 26, 26 28 C25 30, 24 32, 24 35" 
        stroke="url(#treeGradient)" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round"
        filter="url(#treeGlow)"/>
  
  <!-- Main branches - reaching outward with wisdom -->
  <path d="M16 16 C12 14, 8 12, 6 10 C4 8, 3 6, 4 4"
        stroke="url(#treeGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        filter="url(#treeGlow)"/>
        
  <path d="M26 16 C30 14, 34 12, 36 10 C38 8, 39 6, 38 4"
        stroke="url(#treeGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        filter="url(#treeGlow)"/>
  
  <!-- Secondary branches -->
  <path d="M17 22 C13 20, 9 18, 7 16"
        stroke="url(#treeGradient)" 
        stroke-width="1" 
        fill="none" 
        stroke-linecap="round"
        filter="url(#treeGlow)"/>
        
  <path d="M25 22 C29 20, 33 18, 35 16"
        stroke="url(#treeGradient)" 
        stroke-width="1" 
        fill="none" 
        stroke-linecap="round"
        filter="url(#treeGlow)"/>
  
  <!-- Smaller twigs for detail -->
  <path d="M18 12 C15 10, 12 8, 10 6"
        stroke="url(#treeGradient)" 
        stroke-width="0.8" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
        
  <path d="M24 12 C27 10, 30 8, 32 6"
        stroke="url(#treeGradient)" 
        stroke-width="0.8" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
  
  <!-- Roots beneath - showing deep foundation -->
  <path d="M18 35 C16 37, 12 38, 8 37 C4 36, 2 34, 3 32"
        stroke="url(#treeGradient)" 
        stroke-width="1" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.6"/>
        
  <path d="M24 35 C26 37, 30 38, 34 37 C38 36, 40 34, 39 32"
        stroke="url(#treeGradient)" 
        stroke-width="1" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.6"/>
  
  <!-- Central root -->
  <path d="M20 35 C20 37, 20 39, 20 40"
        stroke="url(#treeGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.7"/>
</svg>
