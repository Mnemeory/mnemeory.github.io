<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- The Qu'Poxii - Love, Friendship, Support -->
  <defs>
    <linearGradient id="bondGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B5E55;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5CE7E7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E55;stop-opacity:1" />
    </linearGradient>
    <filter id="bondGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Two interlocking circles representing connection and unity -->
  <circle cx="15" cy="20" r="8" 
          stroke="url(#bondGradient)" 
          stroke-width="2" 
          fill="none"
          filter="url(#bondGlow)"/>
          
  <circle cx="25" cy="20" r="8" 
          stroke="url(#bondGradient)" 
          stroke-width="2" 
          fill="none"
          filter="url(#bondGlow)"/>
  
  <!-- Connecting energy lines showing the bond -->
  <path d="M15 12 C20 8, 25 8, 25 12"
        stroke="url(#bondGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
        
  <path d="M15 28 C20 32, 25 32, 25 28"
        stroke="url(#bondGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
  
  <!-- Central connection point - the heart of the bond -->
  <circle cx="20" cy="20" r="2" 
          fill="url(#bondGradient)"
          filter="url(#bondGlow)"/>
  
  <!-- Radiating energy lines showing support flowing outward -->
  <path d="M20 20 L20 6"
        stroke="url(#bondGradient)" 
        stroke-width="1" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.6"/>
        
  <path d="M20 20 L20 34"
        stroke="url(#bondGradient)" 
        stroke-width="1" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.6"/>
        
  <path d="M20 20 L6 20"
        stroke="url(#bondGradient)" 
        stroke-width="1" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.6"/>
        
  <path d="M20 20 L34 20"
        stroke="url(#bondGradient)" 
        stroke-width="1" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.6"/>
  
  <!-- Diagonal support lines -->
  <path d="M20 20 L28 12"
        stroke="url(#bondGradient)" 
        stroke-width="0.8" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.4"/>
        
  <path d="M20 20 L12 12"
        stroke="url(#bondGradient)" 
        stroke-width="0.8" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.4"/>
        
  <path d="M20 20 L28 28"
        stroke="url(#bondGradient)" 
        stroke-width="0.8" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.4"/>
        
  <path d="M20 20 L12 28"
        stroke="url(#bondGradient)" 
        stroke-width="0.8" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.4"/>
  
  <!-- Small orbital elements showing harmony -->
  <circle cx="8" cy="8" r="1" 
          fill="url(#bondGradient)"
          opacity="0.7"/>
          
  <circle cx="32" cy="8" r="1" 
          fill="url(#bondGradient)"
          opacity="0.7"/>
          
  <circle cx="8" cy="32" r="1" 
          fill="url(#bondGradient)"
          opacity="0.7"/>
          
  <circle cx="32" cy="32" r="1" 
          fill="url(#bondGradient)"
          opacity="0.7"/>
</svg>
