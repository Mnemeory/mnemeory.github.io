name: Mob Radio Playlist

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  generate:
    name: Generate playlist
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Mob Radio playlist
        run: npm run generate:mobradio

      - name: Ensure working tree is clean
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error ::Mob Radio playlist or package files are out of date."
            echo "::error ::Run 'npm run generate:mobradio' locally and commit the changes."
            git status --short
            exit 1
          fi

