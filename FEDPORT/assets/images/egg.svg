<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- The Hatching Egg - New Beginnings, Progress -->
  <defs>
    <linearGradient id="eggGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5C76B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5CE7E7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E5C76B;stop-opacity:1" />
    </linearGradient>
    <filter id="eggGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main egg shape - oval with organic curves -->
  <ellipse cx="20" cy="22" rx="8" ry="12" 
           stroke="url(#eggGradient)" 
           stroke-width="2" 
           fill="none"
           filter="url(#eggGlow)"/>
  
  <!-- Crack lines showing the hatching process -->
  <path d="M16 16 C18 14, 22 14, 24 16"
        stroke="url(#eggGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.9"/>
        
  <path d="M15 20 C17 18, 21 18, 25 20"
        stroke="url(#eggGradient)" 
        stroke-width="1.2" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
        
  <path d="M14 24 C16 22, 20 22, 26 24"
        stroke="url(#eggGradient)" 
        stroke-width="1" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.7"/>
  
  <!-- Emerging energy - new life breaking free -->
  <path d="M20 10 C18 8, 16 6, 15 4"
        stroke="url(#eggGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
        
  <path d="M20 10 C22 8, 24 6, 25 4"
        stroke="url(#eggGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.8"/>
        
  <path d="M20 10 C20 8, 20 6, 20 4"
        stroke="url(#eggGradient)" 
        stroke-width="2" 
        fill="none" 
        stroke-linecap="round"/>
  
  <!-- Small emerging fragments -->
  <circle cx="16" cy="8" r="1" 
          fill="url(#eggGradient)"
          opacity="0.8"/>
          
  <circle cx="24" cy="8" r="1" 
          fill="url(#eggGradient)"
          opacity="0.8"/>
          
  <circle cx="20" cy="6" r="1.5" 
          fill="url(#eggGradient)"/>
  
  <!-- Supporting nest structure showing nurturing environment -->
  <path d="M10 34 C12 32, 16 32, 20 34 C24 32, 28 32, 30 34"
        stroke="url(#eggGradient)" 
        stroke-width="1.5" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.6"/>
        
  <path d="M8 36 C10 34, 14 34, 20 36 C26 34, 30 34, 32 36"
        stroke="url(#eggGradient)" 
        stroke-width="1.2" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.5"/>
  
  <!-- Growth energy lines radiating outward -->
  <path d="M12 18 C8 16, 4 14, 2 12"
        stroke="url(#eggGradient)" 
        stroke-width="0.8" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.5"/>
        
  <path d="M28 18 C32 16, 36 14, 38 12"
        stroke="url(#eggGradient)" 
        stroke-width="0.8" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.5"/>
        
  <path d="M12 26 C8 28, 4 30, 2 32"
        stroke="url(#eggGradient)" 
        stroke-width="0.8" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.5"/>
        
  <path d="M28 26 C32 28, 36 30, 38 32"
        stroke="url(#eggGradient)" 
        stroke-width="0.8" 
        fill="none" 
        stroke-linecap="round"
        opacity="0.5"/>
  
  <!-- Inner potential - the life force within -->
  <ellipse cx="20" cy="22" rx="4" ry="6" 
           stroke="url(#eggGradient)" 
           stroke-width="1" 
           fill="none"
           opacity="0.4"
           stroke-dasharray="2,2"/>
  
  <!-- Central spark of new life -->
  <circle cx="20" cy="20" r="1.5" 
          fill="url(#eggGradient)"
          filter="url(#eggGlow)"/>
</svg>
